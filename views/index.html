<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>يارا AI — صديقتك لكل حديث</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7VQEP4W4SG"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-7VQEP4W4SG');
</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7522095429190990"
     crossorigin="anonymous"></script>
<meta name="description" content="يارا AI، مساعدة ذكاء اصطناعي للدردشة اليومية والعاطفية">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body data-theme="pink-night">

<div class="sky" id="sky" aria-hidden="true"></div>

<div class="app-shell" id="appShell">

  <!-- ============ الشريط الجانبي ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="brand-mini">
        <span class="moon-emoji">🌙</span>
        <span class="brand-name">يارا <b>AI</b></span>
      </div>
      <button class="icon-btn hide-mobile-only" id="collapseBtn" title="طي الشريط الجانبي">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      محادثة جديدة
    </button>

    <div class="conv-list" id="convList"></div>

    <div class="sidebar-bottom">
      <button class="sidebar-btn" id="settingsBtn">
        <svg viewBox="0 0 24 24" width="17" height="17"><path d="M12 15.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7Z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 13a7.4 7.4 0 000-2l1.9-1.5-2-3.4-2.2.9a7.6 7.6 0 00-1.7-1L15 3.5H9l-.4 2.5a7.6 7.6 0 00-1.7 1l-2.2-.9-2 3.4L4.6 11a7.4 7.4 0 000 2l-1.9 1.5 2 3.4 2.2-.9c.5.4 1.1.8 1.7 1l.4 2.5h6l.4-2.5c.6-.2 1.2-.6 1.7-1l2.2.9 2-3.4L19.4 13Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        الإعدادات
      </button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ============ منطقة الدردشة ============ -->
  <main class="main">
    <header class="topbar">
      <button class="icon-btn show-mobile-only" id="menuBtn" title="القائمة">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <span class="topbar-title" id="topbarTitle">محادثة جديدة</span>
      <span style="width:36px"></span>
    </header>

    <div class="chat" id="chat"></div>

    <form class="composer" id="composer">
      <textarea
        id="input"
        rows="1"
        placeholder="اكتبي ما يجول في خاطرك..."
        autocomplete="off"
      ></textarea>
      <button type="submit" id="sendBtn" aria-label="إرسال">
        <svg viewBox="0 0 24 24" width="19" height="19">
          <path d="M3 11.5 20.5 3 12 20.5l-2.2-6.8L3 11.5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </button>
    </form>
    <p class="foot-note">يارا مساعدة ذكاء اصطناعي وليست بديلاً عن الدعم النفسي المتخصص عند الحاجة إليه.</p>
  </main>
</div>

<!-- ============ نافذة الإعدادات ============ -->
<div class="modal-overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>الإعدادات</h2>
      <button class="icon-btn" id="closeSettings">✕</button>
    </div>

    <div class="modal-body">
      <section class="settings-section">
        <h3>الثيم</h3>
        <div class="theme-grid" id="themeGrid"></div>
      </section>

      <section class="settings-section">
        <h3>البيانات</h3>
        <button class="settings-row-btn" id="exportBtn">
          <span>تصدير المحادثة الحالية (txt)</span>
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="settings-row-btn" id="clearCurrentBtn">
          <span>حذف رسائل المحادثة الحالية</span>
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 7h16M9 7V4h6v3m-8 0 1 13h8l1-13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="settings-row-btn danger" id="deleteAllBtn">
          <span>حذف كل المحادثات نهائيًا</span>
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 7h16M9 7V4h6v3m-8 0 1 13h8l1-13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </section>

      <section class="settings-section" id="logoutSection" style="display:none">
        <h3>الحساب</h3>
        <button class="settings-row-btn danger" id="logoutBtn">
          <span>تسجيل الخروج</span>
        </button>
      </section>
    </div>
  </div>
</div>

<!-- ============ نافذة تأكيد ============ -->
<div class="modal-overlay" id="confirmOverlay">
  <div class="modal small">
    <div class="modal-body">
      <p id="confirmText">هل أنتِ متأكدة؟</p>
      <div class="confirm-actions">
        <button class="btn-ghost" id="confirmCancel">إلغاء</button>
        <button class="btn-danger" id="confirmOk">تأكيد الحذف</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>

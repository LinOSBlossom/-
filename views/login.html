<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — يارا AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body data-theme="pink-night">
<div class="sky" id="sky" aria-hidden="true"></div>

<div class="login-screen">
  <div class="login-card">
    <div class="login-moon">🌙</div>
    <h1>يارا <span>AI</span></h1>
    <p class="login-sub">أدخلي كلمة المرور للمتابعة</p>
    <form id="loginForm">
      <input type="password" id="pwd" placeholder="كلمة المرور" autocomplete="current-password" autofocus>
      <button type="submit">دخول</button>
    </form>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<script>
(function stars(){
  const sky = document.getElementById('sky');
  for (let i = 0; i < 60; i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 1;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.top = Math.random() * 100 + '%';
    s.style.left = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 3.5) + 's';
    s.style.animationDuration = (2.5 + Math.random() * 3) + 's';
    sky.appendChild(s);
  }
})();

const savedTheme = localStorage.getItem('yara_theme');
if (savedTheme) document.body.setAttribute('data-theme', savedTheme);

const form = document.getElementById('loginForm');
const err = document.getElementById('loginError');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = '';
  const password = document.getElementById('pwd').value;
  try{
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const data = await res.json();
    if (res.ok && data.ok){
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'حدث خطأ، حاولي مرة أخرى.';
    }
  }catch{
    err.textContent = 'تعذر الاتصال بالسيرفر.';
  }
});
</script>
</body>
</html>
